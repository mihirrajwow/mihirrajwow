<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes revealLine{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes scanbar{0%{transform:translateY(-260px)}100%{transform:translateY(260px)}}
@keyframes glitch1{0%,96%,100%{transform:translate(0,0)}97%{transform:translate(-3px,0)}98%{transform:translate(2px,0)}99%{transform:translate(-1px,0)}}
.line1{clip-path:inset(0 100% 0 0);animation:revealLine .6s cubic-bezier(.4,0,.2,1) forwards .4s}
.line2{clip-path:inset(0 100% 0 0);animation:revealLine .6s cubic-bezier(.4,0,.2,1) forwards 1.4s}
.line3{clip-path:inset(0 100% 0 0);animation:revealLine .5s cubic-bezier(.4,0,.2,1) forwards 2.5s}
.line4{clip-path:inset(0 100% 0 0);animation:revealLine .5s cubic-bezier(.4,0,.2,1) forwards 3.4s}
.line5{clip-path:inset(0 100% 0 0);animation:revealLine .4s cubic-bezier(.4,0,.2,1) forwards 4.2s}
</style>
<rect width="680" height="260" fill="#0a0a0a"/>
<rect width="680" height="1" y="0" fill="#1DA1F2" opacity=".5"/>
<rect width="680" height="1" y="259" fill="#1DA1F2" opacity=".5"/>
<rect width="1" height="260" x="0" fill="#1DA1F2" opacity=".3"/>
<rect width="1" height="260" x="679" fill="#1DA1F2" opacity=".3"/>
<rect x="0" y="0" width="680" height="20" fill="#1DA1F2" opacity=".04" style="animation:scanbar 4s linear infinite"/>
