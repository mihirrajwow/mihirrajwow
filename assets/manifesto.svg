<text x="36" y="90" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">I build things</text>
</g>
<g class="line2">
<text x="36" y="128" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5"><tspan fill="#ffffff">that </tspan><tspan fill="#1DA1F2">actually work.</tspan></text>
</g>
<rect x="36" y="140" width="608" height="1" fill="#333" opacity=".6" style="clip-path:inset(0 100% 0 0);animation:revealLine 1s ease forwards 3s"/>
