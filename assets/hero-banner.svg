<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes lineGrow{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes gridFade{0%,100%{opacity:0.06}50%{opacity:0.13}}
@keyframes particleDrift{0%{transform:translate(0,0);opacity:.8}50%{transform:translate(var(--dx),var(--dy));opacity:.4}100%{transform:translate(0,0);opacity:.8}}
@keyframes dotPulse{0%,100%{r:3.5;opacity:1}50%{r:5.5;opacity:.5}}
</style>
<rect width="680" height="220" fill="#0d1117"/>
<defs>
<pattern id="g" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
<path d="M28 0L0 0 0 28" fill="none" stroke="#1DA1F2" stroke-width="0.4"/>
</pattern>
</defs>
<rect width="680" height="220" fill="url(#g)" style="animation:gridFade 4s ease-in-out infinite"/>
<circle cx="60"  cy="40"  r="1.5" fill="#1DA1F2" style="--dx:8px;--dy:-12px;animation:particleDrift 5.1s ease-in-out infinite 0s"/>
<circle cx="120" cy="80"  r="1"   fill="#1DA1F2" opacity=".6" style="--dx:-6px;--dy:10px;animation:particleDrift 6.3s ease-in-out infinite .5s"/>
<circle cx="580" cy="50"  r="2"   fill="#1DA1F2" style="--dx:-10px;--dy:8px;animation:particleDrift 4.8s ease-in-out infinite 1s"/>
<circle cx="620" cy="140" r="1.5" fill="#1DA1F2" opacity=".7" style="--dx:6px;--dy:-14px;animation:particleDrift 7s ease-in-out infinite .3s"/>
<circle cx="30"  cy="170" r="1"   fill="#1DA1F2" opacity=".5" style="--dx:12px;--dy:-8px;animation:particleDrift 5.5s ease-in-out infinite 1.2s"/>
<circle cx="650" cy="90"  r="1"   fill="#1DA1F2" opacity=".5" style="--dx:-8px;--dy:10px;animation:particleDrift 6.8s ease-in-out infinite .8s"/>
<circle cx="200" cy="190" r="1.5" fill="#1DA1F2" opacity=".6" style="--dx:4px;--dy:-16px;animation:particleDrift 5.9s ease-in-out infinite 1.6s"/>
<circle cx="490" cy="180" r="1"   fill="#1DA1F2" opacity=".4" style="--dx:-6px;--dy:-8px;animation:particleDrift 7.2s ease-in-out infinite .2s"/>
<rect x="40" y="30" width="600" height="160" rx="8" fill="none" stroke="#1DA1F2" stroke-width="0.5" opacity=".15" style="stroke-dasharray:600;stroke-dashoffset:600;animation:lineGrow 1.8s ease forwards .2s"/>
<text x="340" y="86" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="#ffffff" opacity="0" style="animation:fadeUp .8s ease forwards .5s">Mihir Raj</text>
<text x="340" y="116" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="1" fill="#1DA1F2" opacity="0" style="animation:fadeUp .8s ease forwards .9s">&lt; Full Stack Developer · Team Lead · ML Enthusiast /&gt;</text>
<text x="340" y="150" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing=".5" fill="#8b949e" opacity="0" style="animation:fadeUp .8s ease forwards 1.2s">React.js  ·  Java  ·  DSA  ·  C++  ·  JavaScript  ·  Git</text>
<rect x="116" y="168" width="100" height="22" rx="11" fill="none" stroke="#1DA1F2" stroke-width=".8" opacity="0" style="animation:fadeUp .7s ease forwards 1.5s"/>
<text x="166" y="183" text-anchor="middle" font-family="monospace" font-size="10" fill="#1DA1F2" opacity="0" style="animation:fadeUp .7s ease forwards 1.5s">Open to work</text>
<circle cx="107" cy="179" r="3.5" fill="#22c55e" opacity="0" style="animation:fadeUp .7s ease forwards 1.5s,dotPulse 1.5s ease-in-out infinite 2s"/>
<rect x="236" y="168" width="80" height="22" rx="11" fill="none" stroke="#8b949e" stroke-width=".8" opacity="0" style="animation:fadeUp .7s ease forwards 1.7s"/>
<text x="276" y="183" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e" opacity="0" style="animation:fadeUp .7s ease forwards 1.7s">Patna, India</text>
<rect x="334" y="168" width="86" height="22" rx="11" fill="none" stroke="#8b949e" stroke-width=".8" opacity="0" style="animation:fadeUp .7s ease forwards 1.9s"/>
<text x="377" y="183" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e" opacity="0" style="animation:fadeUp .7s ease forwards 1.9s">mihirrajwow</text>
<line x1="40" y1="208" x2="640" y2="208" stroke="#1DA1F2" stroke-width=".5" opacity=".2" style="stroke-dasharray:600;stroke-dashoffset:600;animation:lineGrow 1.2s ease forwards 2s"/>
</svg>
